# 工作流: 自动构建并发布 aicqSDK 到 PyPI
# 当 ctz168/aicqSDK 公开仓库的 main 分支收到推送时，
# 使用 PyPI API Token 自动发布到 PyPI
#
# 需要在 GitHub 仓库 Settings > Secrets 中配置:
#   PYPI_API_TOKEN — PyPI API Token (从 https://pypi.org/manage/account/token/ 获取)
#
# 未来可切换为 Trusted Publisher 模式（需在 PyPI 上预先配置）
name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - 'aicq/**'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  publish:
    name: Build & Publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
